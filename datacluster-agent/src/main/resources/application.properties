# ─── Agent Configuration ──────────────────────────────────────────────────────
server.host=localhost
server.udp.port=5000
server.tcp.port=6000

# Intervalles (ms)
agent.metrics.interval.ms=3000
agent.heartbeat.interval.ms=10000

# Mode chaos (inject CPU spikes, simulated crashes)
agent.chaos.enabled=false

# Seuils locaux déclenchant les alertes TCP
agent.alert.cpu.critical=90.0
agent.alert.ram.critical=85.0
agent.alert.disk.critical=95.0
agent.alert.failed.jobs.threshold=1
