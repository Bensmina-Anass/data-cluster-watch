# ─── Server Network ───────────────────────────────────────────────────────────
server.udp.port=5000
server.tcp.port=6000
server.rmi.port=1099
server.tcp.thread.pool.size=10

# ─── Database (HikariCP) ──────────────────────────────────────────────────────
db.url=jdbc:mysql://localhost:3306/datacluster_watch?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
db.username=datacluster
db.password=datacluster123
db.pool.size=10
db.pool.min.idle=2
db.pool.connection.timeout=30000

# ─── Seuils par défaut ────────────────────────────────────────────────────────
threshold.cpu.warning=75.0
threshold.cpu.critical=90.0
threshold.ram.warning=70.0
threshold.ram.critical=85.0
threshold.disk.warning=80.0
threshold.disk.critical=95.0

# ─── Heartbeat Monitor ────────────────────────────────────────────────────────
heartbeat.timeout.ms=30000
heartbeat.check.interval.ms=15000

# ─── Statistiques ─────────────────────────────────────────────────────────────
stats.moving.avg.window=20
stats.history.minutes=5
